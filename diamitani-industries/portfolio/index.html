<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="description" content="Patrick Diamitani's enterprise AI production portfolio — a Skill &amp; Product Library of production systems used daily by a 50+ person GTM org. A division of Diamitani Industries, Inc.">
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<title>Portfolio — Patrick Diamitani · Enterprise AI Production · Diamitani Industries</title>
<style>
:root {
  /* Diamitani Industries house style — black + gold (dark by default) */
  --bg: #050508;
  --bg-2: #0c0d12;
  --panel: #12131a;
  --ink: #e6e6e8;
  --ink-soft: #b4b5bb;
  --muted: #8c8d93;
  --border: #1e1f26;
  --navy: #c9a227;        /* primary accent remapped to gold */
  --navy-soft: #e0c25a;
  --gold: #c9a227;
  --success: #4ea87a;
  --radius: 10px;
  --shadow: 0 14px 32px rgba(0,0,0,.45);
  --font-serif: "Playfair Display", Georgia, "Times New Roman", serif;
  --font-body: "Inter", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}
:root[data-theme="dark"] {
  --bg: #050508; --bg-2: #0c0d12; --panel: #12131a; --ink: #e6e6e8; --ink-soft: #b4b5bb;
  --muted: #8c8d93; --border: #1e1f26; --navy: #c9a227; --navy-soft: #e0c25a; --gold: #c9a227;
  --success: #4ea87a; --shadow: 0 14px 32px rgba(0,0,0,.45);
}
:root[data-theme="light"] {
  /* optional warm light mode via the toggle */
  --bg: #faf8f4; --bg-2: #f1ece2; --panel: #ffffff; --ink: #1c1b19; --ink-soft: #4a4742;
  --muted: #7a766d; --border: #e4ddd0; --navy: #1b2a4a; --navy-soft: #2e4270; --gold: #a9752f;
  --success: #2f6b4f; --shadow: 0 14px 32px rgba(28,27,25,.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--font-body); line-height: 1.65; -webkit-font-smoothing: antialiased; }
#app { max-width: 100%; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
h1, h2, h3, h4 { font-family: var(--font-serif); line-height: 1.15; color: var(--ink); text-wrap: balance; }
button { font-family: var(--font-body); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }

.nav { position: sticky; top: 0; z-index: 200; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 16px 28px; background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.brand { font-family: var(--font-serif); font-weight: 600; font-size: 17px; display: flex; align-items: center; gap: 8px; cursor: pointer; background: none; border: none; color: var(--ink); }
.brand-div { color: var(--gold); }
.brand-sub { font-family: var(--font-body); font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.nav-links { display: flex; align-items: center; gap: 22px; font-size: 13.5px; color: var(--ink-soft); }
.nav-links button { background: none; border: none; color: inherit; font-size: 13.5px; cursor: pointer; }
.nav-links a:hover, .nav-links button:hover { color: var(--navy); }
.nav-cta { border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px; }
.theme-toggle { border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; background: var(--panel); cursor: pointer; font-size: 13px; color: var(--ink-soft); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14.5px; transition: transform .15s ease, box-shadow .15s ease; cursor: pointer; border: none; }
.btn-primary { background: var(--navy); color: var(--bg); box-shadow: 0 6px 18px color-mix(in srgb, var(--navy) 30%, transparent); }
.btn-primary:hover { transform: translateY(-2px); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--ink-soft); }
.btn-ghost:hover { color: var(--navy); border-color: var(--navy); }
.btn:focus-visible, button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }

.view { animation: fade-in .35s ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.hero { position: relative; padding: 96px 28px 60px; text-align: center; background: radial-gradient(120% 100% at 50% 0, color-mix(in srgb, var(--gold) 9%, var(--bg-2)) 0, var(--bg-2) 42%, var(--bg) 100%); border-bottom: 1px solid var(--border); overflow: hidden; }
.hero-inner { max-width: 780px; margin: 0 auto; }
.hero-eyebrow { font-size: 12px; color: var(--gold); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 18px; font-weight: 600; }
.hero h1 { font-size: clamp(38px, 7vw, 64px); font-weight: 600; letter-spacing: -.01em; }
.hero-tagline { color: var(--ink-soft); font-size: 17.5px; max-width: 620px; margin: 20px auto 0; }
.hero-stats { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin: 38px 0 30px; }
.stat { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 26px; min-width: 130px; }
.stat-n { font-family: var(--font-serif); font-size: 26px; font-weight: 600; color: var(--navy); font-variant-numeric: tabular-nums; }
.stat-l { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
.hero-cta-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

.about-section, .approach-section { padding: 68px 28px; border-bottom: 1px solid var(--border); }
.about-inner { max-width: 840px; margin: 0 auto; }
.about-section h2, .approach-section h2, .contact-section h2 { font-size: 30px; margin-bottom: 24px; }
.about-text p { color: var(--ink-soft); font-size: 16px; margin-bottom: 15px; max-width: 72ch; }
.highlights-block { margin-top: 36px; }
.highlights-block h3 { font-size: 18px; margin-bottom: 15px; font-family: var(--font-serif); }
.highlights-list { list-style: none; display: flex; flex-direction: column; gap: 11px; }
.highlights-list li { position: relative; padding-left: 22px; color: var(--ink-soft); font-size: 14.5px; }
.highlights-list li::before { content: "\2014"; position: absolute; left: 0; color: var(--gold); font-weight: 700; }

.approach-section { background: var(--bg-2); }
.approach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; }
.approach-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
.approach-card h3 { font-size: 16.5px; margin-bottom: 9px; color: var(--navy); font-family: var(--font-serif); }
.approach-card p { font-size: 13.5px; color: var(--ink-soft); }

.library { max-width: 1180px; margin: 0 auto; padding: 68px 28px; }
.library-head { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.library-head h2 { font-size: 30px; }
#search { background: var(--panel); border: 1px solid var(--border); color: var(--ink); border-radius: 8px; padding: 10px 15px; width: min(300px, 100%); font-size: 13.5px; font-family: var(--font-body); }
#search:focus { outline: none; border-color: var(--navy); }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 26px; }
.filter-btn { background: var(--panel); border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 7px 15px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; }
.filter-btn:hover { color: var(--navy); }
.filter-btn.active { background: var(--navy); color: var(--bg); border-color: var(--navy); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card { display: flex; flex-direction: column; gap: 11px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; transition: transform .18s ease, box-shadow .18s; position: relative; text-align: left; cursor: pointer; }
.card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; background: var(--cat-color, var(--navy)); }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.card-top { display: flex; justify-content: space-between; align-items: center; }
.card h3 { font-size: 18px; font-weight: 600; font-family: var(--font-serif); }
.card-blurb { color: var(--ink-soft); font-size: 13.5px; flex-grow: 1; }
.card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 11px; }
.card-demo { font-style: italic; }
.card-cta { color: var(--navy); font-weight: 600; white-space: nowrap; }
.empty { text-align: center; color: var(--muted); padding: 56px 0; }

.badge { font-size: 10.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; letter-spacing: .02em; }
.type-badge { background: var(--bg-2); border: 1px solid var(--border); color: var(--ink-soft); }
.status-badge { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); border: 1px solid color-mix(in srgb, var(--success) 35%, transparent); }
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 10.5px; color: var(--muted); background: var(--bg-2); border: 1px solid var(--border); padding: 3px 9px; border-radius: 6px; }
.chip { font-size: 11.5px; color: var(--ink); background: var(--bg-2); border: 1px solid var(--border); padding: 5px 11px; border-radius: 999px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; }

.contact-section { padding: 76px 28px; text-align: center; background: var(--navy); }
.contact-section h2, .contact-inner p { color: var(--bg); }
.contact-inner p { max-width: 540px; margin: 0 auto 26px; font-size: 15.5px; opacity: .92; }
.contact-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.contact-section .btn-primary { background: var(--bg); color: var(--navy); }
.contact-section .btn-ghost { border-color: color-mix(in srgb, var(--bg) 35%, transparent); color: var(--bg); }

.product-page { max-width: 1040px; margin: 0 auto; padding: 36px 28px 84px; }
.crumbs { font-size: 12.5px; color: var(--muted); margin-bottom: 22px; display: flex; gap: 8px; }
.crumbs button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12.5px; padding: 0; }
.crumbs button:hover { color: var(--navy); }
.product-hero { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
.badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
.product-hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 600; letter-spacing: -.01em; }
.tagline { color: var(--ink-soft); font-size: 16px; margin: 13px 0 16px; max-width: 68ch; }
.metric-callout { display: inline-block; font-weight: 600; color: var(--success); background: color-mix(in srgb, var(--success) 10%, transparent); border: 1px solid color-mix(in srgb, var(--success) 30%, transparent); border-radius: 8px; padding: 9px 15px; margin-bottom: 16px; font-size: 14px; }
.product-body { display: grid; grid-template-columns: 1fr 280px; gap: 28px; align-items: start; }
.side-panel { display: flex; flex-direction: column; gap: 14px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 11px; font-family: var(--font-body); font-weight: 700; }
.panel-cta p { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 13px; }
.panel-cta .btn { width: 100%; }
.req-list { list-style: none; display: flex; flex-direction: column; gap: 7px; font-size: 13px; color: var(--ink-soft); }
.req-list li::before { content: "\2713 "; color: var(--success); font-weight: 700; }

.onesheet { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 34px; }
.onesheet h2 { font-size: 19px; margin: 26px 0 11px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.onesheet h2:first-child { margin-top: 0; }
.onesheet h3 { font-size: 16px; margin: 20px 0 9px; font-family: var(--font-body); font-weight: 700; }
.onesheet p { color: var(--ink-soft); font-size: 14.5px; margin-bottom: 11px; }
.onesheet ul, .onesheet ol { margin: 0 0 13px 21px; color: var(--ink-soft); font-size: 14.5px; display: flex; flex-direction: column; gap: 6px; }
.onesheet strong { color: var(--ink); }
.onesheet code { font-family: var(--font-mono); font-size: 12px; background: var(--bg-2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 5px; color: var(--navy); }
.onesheet hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
.table-wrap { overflow-x: auto; margin: 13px 0 18px; border: 1px solid var(--border); border-radius: 8px; }
.onesheet table { width: 100%; border-collapse: collapse; font-size: 13px; }
.onesheet th { text-align: left; background: var(--bg-2); color: var(--muted); font-weight: 700; padding: 9px 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.onesheet td { padding: 9px 13px; border-bottom: 1px solid var(--border); color: var(--ink-soft); vertical-align: top; }
.onesheet tr:last-child td { border-bottom: none; }

.footer { border-top: 1px solid var(--border); padding: 26px 28px; background: var(--bg-2); }
.footer-inner { max-width: 1180px; margin: 0 auto; display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }

@media (max-width: 860px) {
  .product-body { grid-template-columns: 1fr; }
  .onesheet { padding: 22px 18px; }
  .nav-links a:not(.nav-cta):not(:last-child), .nav-links button:not(:last-child) { display: none; }
}
</style>

<div id="app">
  <nav class="nav">
    <button class="brand" id="nav-brand">Patrick Diamitani<span class="brand-div">/</span><span class="brand-sub">Diamitani Industries · Case Studies</span></button>
    <div class="nav-links">
      <a href="https://www.diamitani.com">Home</a>
      <button id="nav-library">Case Studies</button>
      <a href="https://industries.diamitani.com">Industries</a>
      <a href="https://art.diamitani.com">Art</a>
      <a href="https://music.diamitani.com">Music</a>
      <button id="nav-about">About</button>
      <button id="nav-contact">Contact</button>
      <a class="nav-cta" href="https://linkedin.com/in/diamitani" target="_blank" rel="noopener">LinkedIn ↗</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">◐</button>
    </div>
  </nav>
  <div id="view-root"></div>
  <footer class="footer">
    <div class="footer-inner" style="flex-direction:column;gap:14px;align-items:stretch">
      <div style="display:flex;flex-wrap:wrap;gap:14px 20px;justify-content:space-between;align-items:center">
        <div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Diamitani Industries</div>
        <div style="display:flex;flex-wrap:wrap;gap:14px 18px;font-size:13px">
          <a href="https://www.diamitani.com">Home</a>
          <a href="https://portfolio.diamitani.com/#library" style="color:var(--navy);font-weight:600">Case Studies</a>
          <a href="https://industries.diamitani.com">Industries</a>
          <a href="https://art.diamitani.com">Art</a>
          <a href="https://music.diamitani.com">Music</a>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;border-top:1px solid var(--border);padding-top:14px">
        <div>© 2026 Patrick Diamitani · A division of <a href="https://www.diamitani.com" style="color:inherit;text-decoration:underline">Diamitani Industries, Inc.</a> Case studies anonymized for public portfolio use.</div>
        <div>pdiamitani@atlashxm.com · linkedin.com/in/diamitani</div>
      </div>
    </div>
  </footer>
</div>

<script src="data.js"></script>
<script>
const viewRoot = document.getElementById("view-root");

function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

function renderHome() {
  const n = SITE.products.length;
  const live = SITE.products.filter(p => (p.status || "").toLowerCase().includes("live")).length;

  const highlights = SITE.highlights.map(h => `<li>${h}</li>`).join("");
  const approach = SITE.approach.map(a => `<div class="approach-card"><h3>${esc(a.title)}</h3><p>${a.desc}</p></div>`).join("");
  const cats = SITE.categories;
  const catButtons = cats.map(c => `<button class="filter-btn" data-cat="${esc(c)}">${esc(c)}</button>`).join("");

  const cards = SITE.products.map(p => {
    const blurb = p.portfolio_blurb || p.description_short || "";
    const searchBlob = `${p.name} ${p.tagline} ${(p.tags || []).join(" ")}`.toLowerCase();
    return `
    <button class="card" style="--cat-color:${p.color}" data-cat="${esc(p.category)}" data-search="${esc(searchBlob)}" data-slug="${p.slug}">
      <div class="card-top">
        <span class="badge type-badge">${esc(p.type_label)}</span>
        <span class="badge status-badge">${esc(p.status)}</span>
      </div>
      <h3>${esc(p.name)}</h3>
      <p class="card-blurb">${esc(blurb)}</p>
      <div class="card-footer">
        <span class="card-demo">${esc(p.demonstrates_short || "")}</span>
        <span class="card-cta">Read the build →</span>
      </div>
    </button>`;
  }).join("");

  viewRoot.innerHTML = `
  <div class="view">
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-eyebrow">Enterprise AI Production · Agent Skills & Product Library</div>
        <h1>Patrick Diamitani</h1>
        <p class="hero-tagline">${esc(SITE.hero)}</p>
        <div class="hero-stats">
          <div class="stat"><div class="stat-n">${n}</div><div class="stat-l">Systems in the library</div></div>
          <div class="stat"><div class="stat-n">${live}</div><div class="stat-l">Live in production</div></div>
          <div class="stat"><div class="stat-n">50+</div><div class="stat-l">Daily non-technical users</div></div>
        </div>
        <div class="hero-cta-row">
          <a href="#library" class="btn btn-primary" data-nav="library">View the library ↓</a>
          <a href="#about" class="btn btn-ghost" data-nav="about">About Patrick</a>
        </div>
      </div>
    </header>

    <section id="about" class="about-section">
      <div class="about-inner">
        <h2>About</h2>
        <div class="about-text">${SITE.aboutHtml}</div>
        <div class="highlights-block">
          <h3>Career Highlights</h3>
          <ul class="highlights-list">${highlights}</ul>
        </div>
      </div>
    </section>

    <section class="approach-section">
      <div class="about-inner">
        <h2>Approach</h2>
        <div class="approach-grid">${approach}</div>
      </div>
    </section>

    <main id="library" class="library">
      <div class="library-head">
        <h2>Skill & Product Library</h2>
        <input id="search" type="search" placeholder="Search the library…" aria-label="Search products">
      </div>
      <div class="filters">
        <button class="filter-btn active" data-cat="all">All (${n})</button>
        ${catButtons}
      </div>
      <div class="grid" id="grid">${cards}</div>
      <div id="empty" class="empty" hidden>No systems match — try another search.</div>
    </main>

    <section id="contact" class="contact-section">
      <div class="about-inner contact-inner">
        <h2>Let's talk</h2>
        <p>${esc(SITE.contact)}</p>
        <div class="contact-links">
          <a class="btn btn-primary" href="mailto:pdiamitani@atlashxm.com">Email</a>
          <a class="btn btn-ghost" href="https://linkedin.com/in/diamitani" target="_blank" rel="noopener">LinkedIn ↗</a>
        </div>
      </div>
    </section>
  </div>`;

  const grid = document.getElementById("grid");
  const cardEls = Array.from(grid.querySelectorAll(".card"));
  const filterBtns = Array.from(document.querySelectorAll(".filter-btn"));
  const search = document.getElementById("search");
  const empty = document.getElementById("empty");
  let activeCat = "all";

  function apply() {
    const q = (search?.value || "").trim().toLowerCase();
    let visible = 0;
    cardEls.forEach((c) => {
      const okCat = activeCat === "all" || c.dataset.cat === activeCat;
      const okQ = !q || (c.dataset.search || "").includes(q);
      const show = okCat && okQ;
      c.style.display = show ? "" : "none";
      if (show) visible++;
    });
    if (empty) empty.hidden = visible !== 0;
  }
  filterBtns.forEach((b) => b.addEventListener("click", () => {
    filterBtns.forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    activeCat = b.dataset.cat;
    apply();
  }));
  search?.addEventListener("input", apply);
  cardEls.forEach((c) => c.addEventListener("click", () => { location.hash = `#/p/${c.dataset.slug}`; }));
  viewRoot.querySelectorAll("[data-nav]").forEach((el) => el.addEventListener("click", (e) => {
    // let the hash-based smooth scroll happen after render
  }));
}

function renderProduct(slug) {
  const p = SITE.products.find((x) => x.slug === slug);
  if (!p) { location.hash = ""; return; }
  const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  const integ = (p.integrations || []).map(t => `<span class="chip">${esc(t)}</span>`).join("");
  const reqs = (p.requirements || []).map(r => `<li>${esc(r)}</li>`).join("");

  viewRoot.innerHTML = `
  <main class="product-page view" style="--cat-color:${p.color}">
    <div class="crumbs"><button data-back="library">Skill & Product Library</button> <span>/</span> <span>${esc(p.category)}</span></div>
    <header class="product-hero">
      <div class="badge-row">
        <span class="badge type-badge">${esc(p.type_label)}</span>
        <span class="badge status-badge">${esc(p.status)}</span>
      </div>
      <h1>${esc(p.name)}</h1>
      <p class="tagline">${esc(p.tagline)}</p>
      <div class="metric-callout">${esc(p.headline_metric)}</div>
      <div class="tags">${tags}</div>
    </header>
    <div class="product-body">
      <article class="onesheet">${p.onesheet_html}</article>
      <aside class="side-panel">
        <div class="panel"><h3>Stack & Integrations</h3><div class="chips">${integ}</div></div>
        <div class="panel"><h3>What It Needs</h3><ul class="req-list">${reqs}</ul></div>
        <div class="panel panel-cta">
          <h3>Discuss this build</h3>
          <p>Happy to walk through the architecture, the failures along the way, or how this could translate to your team.</p>
          <a class="btn btn-primary" href="mailto:pdiamitani@atlashxm.com?subject=Portfolio%3A%20${encodeURIComponent(p.name)}">Email Patrick</a>
        </div>
      </aside>
    </div>
  </main>`;
  window.scrollTo({ top: 0, behavior: "instant" });
  const back = viewRoot.querySelector("[data-back]");
  back?.addEventListener("click", () => { location.hash = "#library"; });
}

function router() {
  const hash = location.hash || "";
  const m = hash.match(/^#\/p\/(.+)$/);
  if (m) {
    renderProduct(decodeURIComponent(m[1]));
  } else {
    renderHome();
    if (hash && hash !== "#") {
      requestAnimationFrame(() => {
        const target = document.querySelector(hash);
        target?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
  }
}

window.addEventListener("hashchange", router);
document.getElementById("nav-brand").addEventListener("click", () => { location.hash = ""; window.scrollTo({top:0, behavior:"smooth"}); });
document.getElementById("nav-about").addEventListener("click", () => { location.hash = "#about"; });
document.getElementById("nav-library").addEventListener("click", () => { location.hash = "#library"; });
document.getElementById("nav-contact").addEventListener("click", () => { location.hash = "#contact"; });

const root = document.documentElement;
document.getElementById("theme-toggle").addEventListener("click", () => {
  const current = root.getAttribute("data-theme") || "dark";
  root.setAttribute("data-theme", current === "dark" ? "light" : "dark");
});

router();
</script>

</html>
